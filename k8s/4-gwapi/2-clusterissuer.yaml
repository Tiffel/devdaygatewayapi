---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: infra@cscheer.eu
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-key
    solvers:
      #- dns01
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - kind: Gateway             #explain why later
                name: http-gateway
                namespace: gateway
            serviceType: ClusterIP        #weird cilium behavior. in general, this is not necessary