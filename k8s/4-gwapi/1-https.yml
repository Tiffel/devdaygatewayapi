---
kind: Namespace
apiVersion: v1
metadata:
  name: infra
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: http-gateway
  namespace: infra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      allowedRoutes:
        namespaces:
          from: All
      port: 80
      protocol: HTTP
    - name: https
      allowedRoutes:
        namespaces:
          from: All
      port: 443
      protocol: HTTPS
      hostname: pets.devday.cscheer.eu
      tls:
        mode: Terminate
        certificateRefs:
          - name: http-gateway-https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pets-route
  namespace: pets
spec:
  parentRefs:
    - name: http-gateway
      namespace: infra
  hostnames:
  - pets.devday.cscheer.eu
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /cat
      backendRefs:
        - name: cats-service
          port: 5678