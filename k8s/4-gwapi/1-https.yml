---
kind: Namespace
apiVersion: v1
metadata:
  name: infra
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: http-gateway
  namespace: infra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      allowedRoutes:
        namespaces:
          from: All
      port: 8080
      protocol: HTTP
    - name: https
      hostname: pets.devday.cscheer.eu
      allowedRoutes:
        namespaces:
          from: All
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: http-gateway-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pets-route
  namespace: pets
spec:
  parentRefs:
    - name: http-gateway
      namespace: infra
  hostnames:
  - pets.devday.cscheer.eu
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /cat
      backendRefs:
        - name: cats-service
          port: 5678
    - matches:
        - path:
            type: PathPrefix
            value: /dog
          method: GET
      backendRefs:
        - name: dogs-service
          port: 5678
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oldpets-route
  namespace: pets
spec:
  parentRefs:
    - name: http-gateway
      namespace: infra
  hostnames:
    - oldpets.devday.cscheer.eu
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /cat
      backendRefs:
        - name: cats-service
          port: 5678
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-pet-age
                value: old
